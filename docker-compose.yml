version: "3.8"

services:
  app:
    build: .
    container_name: library_app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/library_db
    volumes:
      - .:/app
      - /app/node_modules
    restart: always 

  mongo:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: